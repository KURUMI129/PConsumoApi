<p>show-message works!</p>
<table class="table align-middle"> <thead>
    <tr>
      <th scope="col">id</th>
      <th scope="col">Foto</th> <th scope="col">NumControl</th>
      <th scope="col">Name</th>
      <th scope="col">Content</th>
    </tr>
  </thead>
  <tbody>
    @for (message of messages; track message.id) {
      <tr>
        <th scope="row">{{ message.id }}</th>
        
        <td>
          <img [src]="message.image" alt="Foto de {{ message.name }}" width="50" height="50" class="rounded-circle shadow-sm">
        </td>

        <td>{{ message.NumControl }}</td>
        <td>{{ message.name }}</td>
        <td>{{ message.content }}</td>
      </tr>
    } @empty {
      <tr>
        <td colspan="5" class="text-center">No hay mensajes o están cargando...</td>
      </tr>
    }
  </tbody>
</table>

@if (error) {
  <p class="text-danger fw-bold">{{ error }}</p>
}
