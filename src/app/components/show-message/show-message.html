<p>show-message works!</p>
<table class="table">
  <thead>
    <tr>
      <th scope="col">id</th>
      <th scope="col">NumControl</th>
      <th scope="col">Name</th>
      <th scope="col">Content</th>
    </tr>
  </thead>
  <tbody>
    @for (message of messages; track message.id) {
      <tr>
        <th scope="row">{{ message.id }}</th>
        <td>{{ message.NumControl }}</td>
        <td>{{ message.name }}</td>
        <td>{{ message.content }}</td>
      </tr>
    } @empty {
      <tr>
        <td colspan="4" class="text-center">No hay mensajes o están cargando...</td>
      </tr>
    }
  </tbody>
</table>

@if (error) {
  <p class="text-danger fw-bold">{{ error }}</p>
}
