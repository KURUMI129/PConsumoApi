<div class="container mt-4">
  <h2>Crear Nuevo Mensaje</h2>
  
  <form (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label class="form-label">Número de Control</label>
      <input type="text" class="form-control" name="numControl" [(ngModel)]="numControl" required>
    </div>
    
    <div class="mb-3">
      <label class="form-label">Nombre</label>
      <input type="text" class="form-control" name="name" [(ngModel)]="name" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Mensaje</label>
      <textarea class="form-control" name="content" [(ngModel)]="content" rows="3" required></textarea>
    </div>

    <div class="mb-3">
      <label class="form-label">Foto de Perfil</label>
      <input type="file" class="form-control" (change)="onFileSelected($event)" accept="image/*">
    </div>

    <button type="submit" class="btn btn-primary">Crear Mensaje</button>
  </form>
</div>
